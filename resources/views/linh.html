<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: 'DM Sans', sans-serif;
            background: #f1f1f1;
        }

        /* LAYOUT */
        .layout {
            display: flex;
            min-height: 100vh;
        }

        /* SIDEBAR */
        .sidebar {
            width: 240px;
            background: #1f1717;
            color: #fff;
            padding: 20px;
        }

        .sidebar h2 {
            font-size: 18px;
            margin-bottom: 25px;
        }

        /* MENU ITEM */
        .menu {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 0;
            color: #cfcfcf;
            text-decoration: none;
            font-size: 14px;
        }

        .menu:hover {
            color: #fff;
        }

        /* MAIN */
        .main {
            flex: 1;
            padding: 25px;
        }

        /* TOPBAR */
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .topbar h1 {
            margin: 0;
            font-size: 22px;
            color: #1f1717;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* BUTTON */

        /* STATS */
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .card {
            background: #fff;
            padding: 18px;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .card h3 {
            margin: 0;
            font-size: 13px;
            color: #777;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card p {
            font-size: 20px;
            margin-top: 8px;
            color: #1f1717;
        }

        /* TABLE */
        .table {
            background: #fff;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 14px;
            font-size: 14px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        th {
            background: #faf9f6;
            text-align: left;
        }

        /* ACTION */
        .action button {
            margin-right: 5px;
            padding: 6px 10px;
            font-size: 12px;
            cursor: pointer;
        }

        .edit {
            background: #f8f5ef;
            border: 1px solid rgba(0, 0, 0, 0.1);
        }

        .delete {
            background: #fff;
            border: 1px solid rgba(0, 0, 0, 0.2);
        }

        /* ICON FIX EMOJI */
        .icon {
            font-size: 16px;
            line-height: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            position: relative;
            top: 1px;
            /* 👈 FIX LỆCH CHUẨN */
        }

        .menu span {
            padding-bottom: 5px;
        }

        .topbar span {
            padding-bottom: 4px;
        }
    </style>
</head>

<body>

    <div class="layout">

        <!-- SIDEBAR -->
        <div class="sidebar">
            <h2>Admin</h2>

            <a class="menu" href="#"><span class="icon">📊</span> Dashboard</a>
            <a class="menu" href="#"><span class="icon">📝</span> Posts</a>
            <a class="menu" href="#"><span class="icon">🔑</span> Change Password</a>
            <a class="menu" href="#"><span class="icon">🚪</span> Logout</a>
        </div>

        <!-- MAIN -->
        <div class="main">

            <div class="topbar">
                <h1><span class="icon">📊</span> Dashboard</h1>
            </div>

            <!-- STATS -->
            <div class="stats">

                <div class="card">
                    <h3>Total Posts</h3>
                    <p>128</p>
                </div>

                <div class="card">
                    <h3>Today Posts</h3>
                    <p>12</p>
                </div>

                <div class="card">
                    <h3>Users</h3>
                    <p>54</p>
                </div>

                <div class="card">
                    <h3>Views</h3>
                    <p>8.2K</p>
                </div>

            </div>

            <!-- TABLE -->
            <div class="table">
                <table>
                    <tr>
                        <th>ID</th>
                        <th>Post</th>
                        <th>Author</th>
                        <th>Views</th>
                        <th>Date</th>
                        <th>Action</th>
                    </tr>

                    <tr>
                        <td>1</td>
                        <td>Learn Laravel</td>
                        <td>Admin</td>
                        <td>1200</td>
                        <td>21/04/2026</td>
                        <td class="action">
                            <button class="edit">Edit</button>
                            <button class="delete">Delete</button>
                        </td>
                    </tr>
                </table>
            </div>

        </div>

    </div>

</body>

</html>
